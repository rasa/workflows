---
# $schema https://json.schemastore.org/github-workflow.json
# ./.github/workflows/debug-matrix.yaml
# https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners#preinstalled-software
# yamllint disable rule:line-length

name: debug-matrix

"on": # quotes required to quiet linter
  # pull_request:
  #   branches:
  #     - main
  #     - master
  #     - releases/v*
  # push:
  #   branches:
  #     - main
  #     - master
  #     - releases/v*
  workflow_call: # Required so this workflow can be called from another workflow
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  debug-matrix:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash --noprofile --norc -e -o pipefail -v -x {0}
    strategy:
      fail-fast: false
      max-parallel: 1
      # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#choosing-github-hosted-runners
      matrix:
        os:
          - ubuntu-latest # aka ubuntu-22.04
          - windows-latest # aka windows-2022
          - macos-latest # aka macos-12
          # - ubuntu-20.04
          # - windows-2019
          # - macos-11
          # - ubuntu-18.04 # deprecated
          # - macos-10.5 # deprecated
    steps:
      - name: USES crazy-max/ghaction-dump-context@v2.1.0
        uses: crazy-max/ghaction-dump-context@v2.1.0
      - if: runner.os == 'Linux'
        run: |
          echo "apt list:"
          apt list --manual-installed=true
          echo "apt-mark:"
          apt-mark showmanual
          echo "snap list:"
          snap list
      - if: runner.os == 'macOS'
        run: |
          echo "pkgutil:"
          pkgutil --pkgs | sort
          echo "brew list:"
          brew list --versions || true
      - if: runner.os == 'Windows'
        uses: MinoruSekine/setup-scoop@main
        with:
          buckets: extras versions
      - if: runner.os == 'Windows'
        shell: cmd
        run: |
          echo Dump chocolatey, scoop, and winget output:
          where winget
          echo scoop --version:
          call scoop --version
          echo choco --version:
          choco --version
          echo choco list:
          choco list --include-programs --yes
          call scoop install --skip --no-update-scoop main/7zip # main/git main/innounp main/dark main/lessmsi
          call scoop install --skip --no-update-scoop versions/winget1.5
          ::# https://github.com/actions/runner-images/issues/6472#issue-1422886379
          ::# yamllint disable rule:line-length
          ::# yamllint disable
          ::# yamllint disable-line rule:line-length
          ::# Invoke-WebRequest -Uri 'https://aka.ms/Microsoft.VCLibs.x64.14.00.Desktop.appx' -OutFile 'VCLibs.appx' | Out-Null # automatically downloads latest version
          ::# yamllint disable-line rule:line-length
          ::# Invoke-WebRequest -Uri 'https://github.com/microsoft/winget-cli/releases/download/latest/Microsoft.DesktopAppInstaller_8wekyb3d8bbwe.msixbundle' -OutFile 'winget.msixbundle' | Out-Null
          ::# yamllint disable-line rule:line-length
          ::# $ReleaseInfo = Invoke-RestMethod 'https://api.github.com/repos/microsoft/winget-cli/releases/latest'
          ::# yamllint disable-line rule:line-length
          ::# Invoke-WebRequest -Uri $ReleaseInfo.assets.Where({ $_.name.EndsWith('License1.xml') }).browser_download_url -OutFile 'license.xml' | Out-Null # because the prefix of the file changes with every release
          ::# yamllint disable-line rule:line-length
          ::# Add-AppxProvisionedPackage -Online -PackagePath winget.msixbundle -LicensePath license.xml -DependencyPackagePath VCLibs.appx | Out-Null
          ::# yamllint enable
          echo scoop list:
          call scoop list
          echo winget list:
          winget list --disable-interactivity --accept-source-agreements | sort
          echo winget --info:
          winget --info --disable-interactivity

      # - if: false # runner.os == 'Windows'
