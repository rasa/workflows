      #   run: |
      #     $hasPackageManager = Get-AppPackage -name 'Microsoft.DesktopAppInstaller'
      #     if (!$hasPackageManager -or [version]$hasPackageManager.Version -lt [version]"1.10.0.0") {
      #       "Installing winget Dependencies"
      #       Add-AppxPackage -Path 'https://aka.ms/Microsoft.VCLibs.x64.14.00.Desktop.appx'
      #       $releases_url = 'https://api.github.com/repos/microsoft/winget-cli/releases/latest'

      #       [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
      #       # yamllint disable-line rule:line-length
      #       $releases = Invoke-RestMethod -uri $releases_url
      #       $latestRelease = $releases.assets | Where { $_.browser_download_url.EndsWith('msixbundle') } | Select -First 1

      #       "Installing winget from $($latestRelease.browser_download_url)"
      #       Add-AppxPackage -Path $latestRelease.browser_download_url
      #     } else {
      #       "winget already installed"
      #     }
      #     #### Creating settings.json #####
      #     if ([System.Security.Principal.WindowsIdentity]::GetCurrent().IsSystem) {
      #       # yamllint disable-line rule:line-length
      #       $SettingsPath = "$Env:windir\system32\config\systemprofile\AppData\Local\Microsoft\WinGet\Settings\settings.json"
      #     } else {
      #      # yamllint disable-line rule:line-length
      #       $SettingsPath = "$env:LOCALAPPDATA\Packages\Microsoft.DesktopAppInstaller_8wekyb3d8bbwe\LocalState\settings.json"
      #     }
      #     if (Test-Path $SettingsPath) {
      #       $ConfigFile = Get-Content -Path $SettingsPath | Where-Object {$_ -notmatch '//'} | ConvertFrom-Json
      #     }
      #     if (!$ConfigFile){
      #       $ConfigFile = @{}
      #     }
      #     if ($ConfigFile.installBehavior.preferences.scope) {
      #       $ConfigFile.installBehavior.preferences.scope = "Machine"
      #     } else {
      #       Add-Member -InputObject $ConfigFile -MemberType NoteProperty -Name 'installBehavior' -Value $(
      #         New-Object PSObject -Property $(@{preferences = $(
      #           New-Object PSObject -Property $(@{scope = "Machine"}))
      #         })
      #       ) -Force
      #     }
      #     $ConfigFile | ConvertTo-Json | Out-File $SettingsPath -Encoding utf8 -Force

      - name: USES actions/checkout
        uses: actions/checkout@v3.5.3

      # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsshell
      - name: RUN sh ./dumpvars.sh
        # if: contains('Linux_macOS', runner.os)
        # sh -e {0}
        shell: sh -e -v -x {0}
        run: ./dumpvars.sh sh

      - name: RUN bash ./dumpvars.bash
        # bash --noprofile --norc -eo pipefail {0}
        shell: bash
        run: ./dumpvars.bash bash

      - name: RUN pwsh ./dumpvars.ps1
        # pwsh -command ". '{0}'"
        shell: pwsh
        run: ./dumpvars.ps1 pwsh

      - name: RUN powershell ./dumpvars.ps1 (Windows)
        if: runner.os == 'Windows'
        # powershell -command ". '{0}'"
        shell: powershell
        run: ./dumpvars.ps1 powershell

      - name: RUN cmd dumpvars.cmd (Windows)
        if: runner.os == 'Windows'
        # `shell: cmd` runs this shell:
        # %ComSpec% /D /E:ON /V:OFF /S /C "CALL "{0}""
        # /D     Ignore registry AutoRun commands
        # /E:ON  Enable CMD Command Extensions
        # /V:OFF Disable delayed environment variable expansion
        # /S     Strip " quote characters from command.
        # /C     Run Command and then terminate
        shell: 'cmd /D /E:ON /V:ON /S /C "CALL "{0}""'
        run: dumpvars.cmd cmd

      - name: RUN list executables (Linux)
        if: runner.os == 'Linux'
        # shell: bash
        run: |
          # list executables (Linux)
          IFS=: read -r -a paths <<<"${PATH}"
          find "${paths[@]}" -maxdepth 1 -type f,l -executable -printf '%P\t%h\n' | \
            LC_COLLATE=C sort --ignore-case -u | \
            column -ts $'\t' || true

      - name: RUN list executables (macOS)
        if: runner.os == 'macOS'
        # shell: bash
        run: |
          # list executables (macOS)
          which bash
          which sh
          IFS=: read -r -a paths <<<"${PATH}"
          find "${paths[@]}" -maxdepth 1 -perm +111 -type f -or -type l -print | \
            awk '{b=$0;sub(/\/.*\//,"", b);sub(/\/[a-z]*$/,"",$0);print b "\t" $0}' | \
            LC_COLLATE=C sort --ignore-case -u | \
            column -ts $'\t' || true

      - name: RUN list executables (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # list executables (Windows)
          set -vx
          IFS=: read -r -a paths <<<"${PATH}"
          find "${paths[@]}" -maxdepth 1 -type f,l -regextype posix-extended -iregex '.*\.(bat|cmd|com|exe)$' -printf '%P\t%h\n' | \
            LC_COLLATE=C sort --ignore-case -u | \
            column -ts $'\t' || true

      - name: RUN python
        # python {0}
        # this is python2 on macOS
        shell: python
        run: |
          # run dumpvars.py commands:
          import os
          import pprint
          import sys
          print("os.name=%s" % os.name)
          print("sys.executable=%s" % sys.executable)
          print("sys.argv=")
          pprint.pprint(sys.argv)
          print("sys.version=%s" % sys.version)
          print("sys.platform=%s" % sys.platform)
          print("os.environ=")
          pprint.pprint(dict(os.environ), width=4096)
          sys.exit(0)

      - name: RUN python dumpvars.py
        # python {0}
        # this is python2 on macOS
        shell: python
        run: |
          # Execute python dumpvars.py
          import os
          import sys
          os.system(" ".join([sys.executable, "./dumpvars.py", "arg1", "arg2"]))

      - name: RUN python3
        shell: python3 {0}
        run: |
          # run dumpvars.py commands:
          import os
          import pprint
          import sys
          print("os.name=%s" % os.name)
          print("sys.executable=%s" % sys.executable)
          print("sys.argv=")
          pprint.pprint(sys.argv)
          print("sys.version=%s" % sys.version)
          print("sys.platform=%s" % sys.platform)
          print("os.environ=")
          pprint.pprint(dict(os.environ), width=4096)
          sys.exit(0)

      - name: RUN python3 dumpvars.py
        shell: python3 {0}
        run: |
          # Execute python3 dumpvars.py
          import pprint
          import subprocess
          import sys
          rv = subprocess.run([sys.executable, "./dumpvars.py", "arg1", "arg2"])
          pprint.pprint(rv)
          sys.exit(0)

      - name: RUN python3 dumpvars.py shell=true
        shell: python3 {0}
        run: |
          # Execute python3 dumpvars.py
          import pprint
          import subprocess
          import sys
          rv = subprocess.run([sys.executable, "./dumpvars.py", "arg1", "arg2"], shell=True)
          pprint.pprint(rv)
          sys.exit(0)

      - name: RUN python dumpvars.py
        shell: python dumpvars.py {0}
        run: |
          # Execute python dumpvars.py

      - name: RUN python3 dumpvars.py
        shell: python3 dumpvars.py {0}
        run: |
          # Execute python3 dumpvars.py

