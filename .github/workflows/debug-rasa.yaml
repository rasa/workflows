---
# $schema https://json.schemastore.org/github-workflow.json
# ./.github/workflows/debug-rasa.yaml

name: debug-rasa

env:
  WORKFLOW_USER: rasa
  WORKFLOW_REPO: workflows

"on": # quotes required to quiet linter
  # push:
  # pull_request:
  workflow_call: # Required so this workflow can be called from another workflow
    inputs:
      workflow_user:
        description: "Github user name (default is 'rasa')"
        required: false
        type: string
      workflow_repo:
        description: "Github repository name (default is 'workflows')"
        required: false
        type: string
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      workflow_user:
        description: "Github user name (default is 'rasa')"
        required: false
        type: string
      workflow_repo:
        description: "Github repository name (default is 'workflows')"
        required: false
        type: string

jobs:
  debug-rasa:
    runs-on: ubuntu-22.04
    steps:
      - uses: crazy-max/ghaction-dump-context@v2.1.0
        with:
          workflow_user: ${{ inputs.workflow_user }}
          workflow_repo: ${{ inputs.workflow_repo }}
        env:
          WORKFLOW_USER: ${{ inputs.workflow_user || env.WORKFLOW_USER }}
          WORKFLOW_REPO: ${{ inputs.workflow_repo || env.WORKFLOW_REPO }}

# cSpell:ignore rasa

# eof
